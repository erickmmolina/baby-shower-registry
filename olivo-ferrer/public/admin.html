<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Baby Shower Olivo Ferrer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0f1e2e;--sky:#4a90d9;--sky-light:#7eb8f0;--gold:#c9a96e;--cream:#f7f3ed;--white:#fff;--text:#2c3e50;--muted:#7a8fa6;--green:#4caf85;--red:#e74c3c}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);padding:20px;max-width:1200px;margin:0 auto}

    h1{font-size:1.6rem;color:var(--navy);margin-bottom:6px}
    .subtitle{color:var(--muted);font-size:.85rem;margin-bottom:30px}
    a{color:var(--sky)}

    .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .tab{padding:10px 24px;border-radius:10px;border:1px solid #d0d8e0;background:var(--white);font-family:inherit;font-size:.85rem;cursor:pointer;transition:all .2s;color:var(--muted)}
    .tab:hover{border-color:var(--sky);color:var(--navy)}
    .tab.active{background:var(--navy);border-color:var(--navy);color:var(--white)}

    .panel{display:none}
    .panel.active{display:block}

    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
    .stat{background:var(--white);border:1px solid #e8edf2;border-radius:12px;padding:20px;text-align:center}
    .stat-val{font-size:1.8rem;font-weight:600;color:var(--navy)}
    .stat-label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}

    /* Table */
    .table-wrap{overflow-x:auto;background:var(--white);border:1px solid #e8edf2;border-radius:12px}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    th{background:#f5f7fa;padding:12px 14px;text-align:left;font-weight:500;color:var(--navy);font-size:.72rem;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
    td{padding:10px 14px;border-top:1px solid #f0f2f5;vertical-align:middle}
    tr:hover td{background:#fafbfc}

    .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:500}
    .badge-available{background:rgba(74,144,217,.1);color:var(--sky)}
    .badge-claimed{background:rgba(76,175,133,.1);color:var(--green)}
    .badge-priority{background:rgba(201,169,110,.15);color:var(--gold)}

    .btn-sm{padding:6px 14px;border-radius:7px;border:1px solid #d8e2ea;background:var(--white);font-family:inherit;font-size:.75rem;cursor:pointer;transition:all .2s;color:var(--text)}
    .btn-sm:hover{border-color:var(--sky);color:var(--sky)}
    .btn-sm.danger{color:var(--red);border-color:var(--red)}
    .btn-sm.danger:hover{background:var(--red);color:var(--white)}
    .btn-sm.release{color:var(--gold);border-color:var(--gold)}
    .btn-sm.release:hover{background:var(--gold);color:var(--white)}

    .claimed-info{font-size:.72rem;color:var(--muted);line-height:1.5}
    .claimed-info strong{color:var(--text)}

    /* RSVP cards */
    .rsvp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .rsvp-card{background:var(--white);border:1px solid #e8edf2;border-radius:12px;padding:18px}
    .rsvp-card.attending{border-left:3px solid var(--green)}
    .rsvp-card.not-attending{border-left:3px solid var(--red)}
    .rsvp-name{font-weight:500;color:var(--navy);margin-bottom:4px}
    .rsvp-email{font-size:.78rem;color:var(--muted);margin-bottom:8px}
    .rsvp-detail{font-size:.78rem;color:var(--text);line-height:1.6}
    .rsvp-msg{font-style:italic;color:var(--muted);font-size:.78rem;margin-top:6px;padding-top:6px;border-top:1px solid #f0f2f5}
  </style>
</head>
<body>

<h1>Panel de Administración</h1>
<p class="subtitle">Baby Shower Olivo Ferrer · <a href="/">Ver sitio</a></p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('gifts',this)">Regalos</button>
  <button class="tab" onclick="switchTab('rsvps',this)">Confirmaciones</button>
</div>

<!-- GIFTS PANEL -->
<div class="panel active" id="panel-gifts">
  <div class="stats" id="giftStats"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Categoría</th>
          <th>Nombre</th>
          <th>Tienda</th>
          <th>Precio</th>
          <th>Estado</th>
          <th>Reservado por</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="giftsTable"></tbody>
    </table>
  </div>
</div>

<!-- RSVP PANEL -->
<div class="panel" id="panel-rsvps">
  <div class="stats" id="rsvpStats"></div>
  <div class="rsvp-grid" id="rsvpGrid"></div>
</div>

<script>
const fmt = n => n ? n.toLocaleString('es-CL') : '-';

function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
}

// ─── Load gifts ───
async function loadGifts() {
  const res = await fetch('/api/gifts');
  const gifts = await res.json();

  const total = gifts.length;
  const available = gifts.filter(g => g.status !== 'Ya elegido').length;
  const claimed = total - available;

  document.getElementById('giftStats').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-val">${available}</div><div class="stat-label">Disponibles</div></div>
    <div class="stat"><div class="stat-val">${claimed}</div><div class="stat-label">Elegidos</div></div>
  `;

  document.getElementById('giftsTable').innerHTML = gifts.map(g => {
    const isClaimed = g.status === 'Ya elegido';
    const claimed = g.claimedBy;
    return `<tr>
      <td>${g.id}</td>
      <td>${g.cat || '-'}</td>
      <td><strong>${g.name}</strong></td>
      <td>${g.store || '-'}</td>
      <td>${g.price ? '$' + fmt(g.price) : '-'}</td>
      <td><span class="badge ${isClaimed ? 'badge-claimed' : 'badge-available'}">${g.status}</span>
        ${g.priority ? ` <span class="badge badge-priority">${g.priority}</span>` : ''}</td>
      <td>${claimed ? `<div class="claimed-info"><strong>${claimed.nombre} ${claimed.apellido}</strong><br>${claimed.email}<br>${claimed.telefono || ''}<br>${new Date(claimed.fecha).toLocaleDateString('es-CL')}</div>` : '-'}</td>
      <td>
        ${isClaimed ? `<button class="btn-sm release" onclick="releaseGift(${g.id})">Liberar</button>` : ''}
        ${g.link1 ? `<a class="btn-sm" href="${g.link1}" target="_blank">Ver</a>` : ''}
      </td>
    </tr>`;
  }).join('');
}

async function releaseGift(id) {
  if (!confirm('¿Liberar este regalo?')) return;
  await fetch('/api/release', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({giftId: id}) });
  loadGifts();
}

// ─── Load RSVPs ───
async function loadRsvps() {
  const res = await fetch('/api/rsvps');
  const rsvps = await res.json();

  const total = rsvps.length;
  const attending = rsvps.filter(r => r.asiste).length;
  const totalGuests = rsvps.filter(r => r.asiste).reduce((sum, r) => sum + 1 + (parseInt(r.acompanantes) || 0), 0);

  document.getElementById('rsvpStats').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Respuestas</div></div>
    <div class="stat"><div class="stat-val">${attending}</div><div class="stat-label">Asisten</div></div>
    <div class="stat"><div class="stat-val">${total - attending}</div><div class="stat-label">No asisten</div></div>
    <div class="stat"><div class="stat-val">${totalGuests}</div><div class="stat-label">Total invitados</div></div>
  `;

  document.getElementById('rsvpGrid').innerHTML = rsvps.length
    ? rsvps.map(r => `
      <div class="rsvp-card ${r.asiste ? 'attending' : 'not-attending'}">
        <div class="rsvp-name">${r.asiste ? '✓' : '✗'} ${r.nombre} ${r.apellido || ''}</div>
        <div class="rsvp-email">${r.email}</div>
        <div class="rsvp-detail">
          ${r.asiste ? `Asiste${r.acompanantes > 0 ? ` (+${r.acompanantes} acomp.)` : ''}` : 'No asiste'}
          · ${new Date(r.fecha).toLocaleDateString('es-CL')}
        </div>
        ${r.mensaje ? `<div class="rsvp-msg">"${r.mensaje}"</div>` : ''}
      </div>`).join('')
    : '<p style="color:var(--muted);padding:20px">Aún no hay confirmaciones.</p>';
}

// Init
loadGifts();
loadRsvps();
</script>
</body>
</html>
